<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spell Checker App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>📝 Spell Checker</h1>
        <form method="POST">
            <textarea name="text" placeholder="Enter your text here...">{{ original_text }}</textarea>
            <button type="submit">Check Spelling</button>
        </form>

        {% if corrected_text %}
        <div class="output">
            <h2>✅ Corrected Text:</h2>
            <p>{{ corrected_text }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
